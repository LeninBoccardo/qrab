name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same workflow on the same ref — a quick
# follow-up push shouldn't keep the previous (now stale) build running.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Match the Ubuntu build job's shared-key so its cold compile
          # benefits from this job's warm cargo cache.
          shared-key: ubuntu-latest

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Rust format check
        run: npm run fmt:rust:check

      - name: Prettier check
        run: npm run fmt:check

      - name: Clippy
        run: npm run clippy

      - name: TypeScript type check
        run: npm run lint

      - name: Rust tests
        run: npm run test:rust

      - name: Frontend tests
        run: npm test

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # `check` already covers fast feedback; let the slower matrix run
    # only once linting and tests pass on Linux so a contributor doesn't
    # wait 10+ minutes on three OSes just to find out clippy is angry.
    needs: check
    strategy:
      # Don't kill the other OSes when one fails — we want to see every
      # platform-specific break, not just the first.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Cache shared across the check + build jobs on the same OS.
          shared-key: ${{ matrix.os }}

      - name: Install Tauri Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Tauri build
        run: npm run tauri build
